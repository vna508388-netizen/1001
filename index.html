<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Rady ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #FFF0F5; /* Lavender Blush */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- SCREEN 1: THE INITIAL HEART BUTTON --- */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        h1 {
            color: #D81B60;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .heart-btn {
            font-size: 4rem;
            width: 120px;
            height: 120px;
            background-color: #FF4081;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 64, 129, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 1.2s infinite ease-in-out;
            transition: transform 0.2s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 12px 20px rgba(255, 64, 129, 0.6); }
            100% { transform: scale(1); }
        }

        /* --- SCREEN 2: THE SURPRISE ANIMATION --- */
        #animation-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://media.giphy.com/media/26FLdmIp6wJr91JAI/giphy.gif'); /* Fullscreen background hearts */
            background-size: cover;
            background-position: center;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .gif-container {
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .love-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 1rem 2rem;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
            backdrop-filter: blur(5px);
        }

        #love-text {
            color: #C2185B;
            font-size: 1.6rem;
            font-weight: bold;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="welcome-screen">
        <h1>Tap for a surprise, Rady! ❤️</h1>
        <button class="heart-btn" onclick="revealSurprise()">❤️</button>
    </div>

    <!-- Hidden Fullscreen Animation Screen -->
    <div id="animation-screen">
        <!-- Top Cartoon Animal GIF -->
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMmswN3A5cnE0bXN5cXN5Znd0Z3Y0b3N6bnd6bXg0ZXE0ZXF4M2ZpciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/L4lvBpHn96itbM68LB/giphy.gif" alt="Cute Animal 1">
        </div>

        <!-- Dynamic Love Language Messages -->
        <div class="love-box">
            <p id="love-text">I Love You, Rady! 💖</p>
        </div>

        <!-- Bottom Cartoon Animal/Person GIF -->
        <div class="gif-container">
            <!-- Alternative classic milk/mocha cute bear kiss gif -->
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMmswN3A5cnE0bXN5cXN5Znd0Z3Y0b3N6bnd6bXg0ZXE0ZXF4M2ZpciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/vKzu74HksV98B7pZ8f/giphy.gif" alt="Cute Animal 2">
        </div>
    </div>

    <script>
        // List of rotating romantic messages
        const messages = [
            "You mean the world to me, Rady! 🌍",
            "My favorite place is inside your hugs. 🤗",
            "You make my heart skip a beat! 💓",
            "Forever and always. 🏹✨",
            "You are my sweetest dream come true! 🧸"
        ];

        function revealSurprise() {
            const welcome = document.getElementById('welcome-screen');
            const animation = document.getElementById('animation-screen');

            // Fade out button screen
            welcome.style.opacity = '0';
            
            setTimeout(() => {
                welcome.style.display = 'none';
                
                // Show and fade in animation screen
                animation.style.display = 'flex';
                setTimeout(() => {
                    animation.style.opacity = '1';
                }, 50);

                // Start updating text every 2.5 seconds
                startMessageRotation();
            }, 500);
        }

        function startMessageRotation() {
            const textElement = document.getElementById('love-text');
            let index = 0;

            setInterval(() => {
                // Smoothly fade out text, swap content, then fade back in
                textElement.style.opacity = '0';
                
                setTimeout(() => {
                    textElement.innerText = messages[index];
                    textElement.style.opacity = '1';
                    index = (index + 1) % messages.length;
                }, 400);

            }, 2800);
        }
    </script>
</body>
</html>
